name: Sync 2026 Apuracion

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: URL do JSON 2026 no formato esperado pelo site
        required: false
        type: string
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  sync-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve source URL
        id: source
        shell: bash
        env:
          INPUT_SOURCE_URL: ${{ inputs.source_url }}
          VAR_SOURCE_URL: ${{ vars.APURACION_2026_SOURCE_URL }}
        run: |
          SOURCE_URL="${INPUT_SOURCE_URL}"
          if [ -z "$SOURCE_URL" ]; then
            SOURCE_URL="${VAR_SOURCE_URL}"
          fi
          if [ -z "$SOURCE_URL" ]; then
            echo "Nenhuma URL configurada. Defina a variável APURACION_2026_SOURCE_URL no repositório ou passe source_url no workflow_dispatch."
            exit 1
          fi
          echo "source_url=$SOURCE_URL" >> "$GITHUB_OUTPUT"

      - name: Download, validate and write JSON
        env:
          SOURCE_URL: ${{ steps.source.outputs.source_url }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request
          from pathlib import Path

          url = os.environ["SOURCE_URL"]
          target = Path("2026_apuracion/resultado_presidencial.json")
          target.parent.mkdir(parents=True, exist_ok=True)

          required_top = {
              "resultados_primera_vuelta",
              "territorial_primera_vuelta",
              "metadatos_acta_primera_vuelta_nacional",
          }
          required_territorial = {
              "por_departamento_detalle",
              "por_provincia",
              "por_distrito",
          }

          try:
              with urllib.request.urlopen(url, timeout=60) as resp:
                  raw = resp.read()
          except Exception as exc:
              print(f"Falha ao baixar {url}: {exc}", file=sys.stderr)
              sys.exit(1)

          try:
              incoming = json.loads(raw.decode("utf-8"))
          except Exception as exc:
              print(f"O conteúdo baixado não é um JSON UTF-8 válido: {exc}", file=sys.stderr)
              sys.exit(1)

          missing_top = sorted(required_top - set(incoming))
          territorial = incoming.get("territorial_primera_vuelta") or {}
          missing_territorial = sorted(required_territorial - set(territorial))

          if missing_top or missing_territorial:
              print("O JSON baixado não tem o formato esperado pelo site.", file=sys.stderr)
              print(f"Campos de topo ausentes: {missing_top}", file=sys.stderr)
              print(f"Campos territoriais ausentes: {missing_territorial}", file=sys.stderr)
              sys.exit(1)

          normalized_text = json.dumps(incoming, ensure_ascii=False, indent=2) + "\n"

          if target.exists():
              try:
                  current = json.loads(target.read_text(encoding="utf-8"))
              except Exception:
                  current = None
              if current == incoming:
                  print("Sem mudanças no JSON 2026.")
                  sys.exit(0)

          target.write_text(normalized_text, encoding="utf-8")
          print(f"Arquivo atualizado em {target}")
          PY

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet -- 2026_apuracion/resultado_presidencial.json; then
            echo "Nenhuma mudança para commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 2026_apuracion/resultado_presidencial.json
          git commit -m "chore: sync 2026 apuracion json"
          git push
